# AcWing 风格 tmux 配置
# 核心特点：前缀键改为 Ctrl+a，开启鼠标支持，优化窗格管理

# ======================================
# 基础设置
# ======================================
# 1. 修改前缀键为 Ctrl+a（替代默认 Ctrl+b，更符合 AcWing 教程习惯）
unbind C-b
set -g prefix C-a
bind C-a send-prefix  # 双击 Ctrl+a 发送原始 Ctrl+a

# 2. 开启鼠标模式（支持点击切换窗格、调整大小、滚轮翻页）
set -g mouse on

# 3. 窗口和窗格索引从 1 开始（更符合直觉）
set -g base-index 1
setw -g pane-base-index 1

# 4. 启用 256 色支持（适配 Vim 等编辑器配色）
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# 5. 增加历史缓冲区大小（保存更多命令输出）
set -g history-limit 100000

# 6. 关闭烦人的响铃提示
set -g bell-action none

# ======================================
# 窗格管理快捷键（AcWing 教程核心操作）
# ======================================
# 水平分屏（左右）：prefix + %
# 垂直分屏（上下）：prefix + "
# 切换窗格：鼠标点击或 prefix + 方向键
# 关闭窗格：prefix + x 或直接输入 exit

# 更直观的分屏快捷键（可选）
bind | split-window -h -c "#{pane_current_path}"  # prefix + | 水平分屏（当前目录）
bind - split-window -v -c "#{pane_current_path}"  # prefix + - 垂直分屏（当前目录）

# 调整窗格大小（默认 prefix + Ctrl+方向键，也可鼠标拖拽）
bind -r H resize-pane -L 5  # 左移 5 格
bind -r J resize-pane -D 5  # 下移 5 格
bind -r K resize-pane -U 5  # 上移 5 格
bind -r L resize-pane -R 5  # 右移 5 格

# ======================================
# 窗口管理
# ======================================
# 新建窗口：prefix + c（当前目录）
bind c new-window -c "#{pane_current_path}"

# 关闭窗口：prefix + &
# 切换窗口：prefix + 窗口编号（1-9）

# 重命名窗口：prefix + ,（无需确认）
bind , command-prompt -I "#W" "rename-window '%%'"

# ======================================
# 会话管理
# ======================================
# 新建会话：tmux new -s 会话名
# 分离会话：prefix + d
# 接入会话：tmux a -t 会话名
# 列出会话：tmux ls

# ======================================
# 其他实用设置
# ======================================
# 重新加载配置文件：prefix + r
bind r source-file ~/.tmux.conf \; display "✅ 配置已重载！"

# 开启窗口自动重命名（根据当前目录）
setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_path##*/}"  # 只显示目录名

# 状态栏设置（简洁实用）
set -g status-position bottom
set -g status-style bg=black,fg=green
set -g status-interval 10
set -g status-left "#[fg=yellow]#S #[fg=white]• #[fg=cyan]#I #[fg=white]•"
set -g status-right "#[fg=white]%Y-%m-%d #[fg=cyan]%H:%M"
setw -g window-status-current-style "bg=green,fg=black,bold"